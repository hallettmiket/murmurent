site_name: Murmurent
site_description: >-
  Shared agentic-AI infrastructure for research groups — agents, rules,
  cryptographic membership, and institutional memory on top of Claude Code.
site_url: https://hallettmiket.github.io/murmurent/
repo_url: https://github.com/hallettmiket/murmurent
repo_name: hallettmiket/murmurent
edit_uri: edit/main/docs/

copyright: >
  Built by the <a href="https://mikehallett.science">Hallett Lab</a>, Department of Biochemistry,
  <a href="https://www.schulich.uwo.ca/">Schulich School of Medicine &amp; Dentistry</a>,
  <a href="https://www.uwo.ca/">Western University</a>, London, ON, Canada.
  We acknowledge that Western University is located on the traditional lands of the
  Anishinaabek, Haudenosaunee, L&#363;naap&#233;ewak and Attawandaron peoples.

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details

# Internal working documents that shouldn't render on the public site.
exclude_docs: |
  implementation_prompt*.md
  backlog.md
  cores_plan.md
  cores_smoke_runbook.md
  designer_dashboard/
  murmurent_public/
  diagrams/README.md

