<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>wigamig dashboard — wireframes</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&family=Special+Elite&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style id="theme">
      :root {
        --paper: #f4ede0;
        --paper-2: #ece3d1;
        --ink: #1a1714;
        --pencil: #6e6557;
        --pencil-soft: #a89e8c;
        --rule: #c8bda6;
        --amber: #d97757;
        --red: #c0392b;
        --green: #4f6b3a;
        --hand: "Caveat", "Comic Sans MS", cursive;
        --body: "Kalam", "Caveat", cursive;
        --type: "Special Elite", "Courier Prime", monospace;
        --mono: "IBM Plex Mono", "Courier Prime", monospace;
        --serif: "EB Garamond", Georgia, serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--body);
        font-size: 16px;
        line-height: 1.45;
      }
      body {
        background-image:
          radial-gradient(circle at 0 0, rgba(0,0,0,0.025) 1px, transparent 1px),
          radial-gradient(circle at 50% 50%, rgba(0,0,0,0.018) 1px, transparent 1px);
        background-size: 6px 6px, 9px 9px;
      }
      .app { max-width: 1280px; margin: 0 auto; padding: 28px 36px 80px; }

      /* ---- top header / tabs ----- */
      .masthead {
        display: flex; align-items: flex-end; justify-content: space-between;
        border-bottom: 2px solid var(--ink); padding-bottom: 10px; margin-bottom: 6px;
      }
      .masthead h1 {
        font-family: var(--hand); font-weight: 700; font-size: 56px;
        margin: 0; line-height: 0.9; letter-spacing: -1px;
      }
      .masthead .sub {
        font-family: var(--type); font-size: 12px; color: var(--pencil);
        text-transform: uppercase; letter-spacing: 2px;
      }
      .masthead .meta {
        font-family: var(--type); font-size: 11px; color: var(--pencil);
        text-align: right; line-height: 1.6;
      }
      .masthead .meta b { color: var(--ink); }

      .tabbar {
        display: flex; gap: 0; align-items: stretch;
        border-bottom: 2px solid var(--ink);
        margin-bottom: 36px;
        position: sticky; top: 0; background: var(--paper); z-index: 10;
        padding-top: 6px;
      }
      .tab {
        font-family: var(--hand); font-size: 22px; font-weight: 600;
        background: transparent; border: 0; cursor: pointer;
        padding: 8px 18px 10px; color: var(--pencil);
        border-bottom: 4px solid transparent;
        margin-bottom: -2px;
        white-space: nowrap;
      }
      .tab .num {
        font-family: var(--mono); font-size: 11px; color: var(--pencil-soft);
        margin-right: 6px; font-weight: 500;
      }
      .tab.active {
        color: var(--ink); border-bottom-color: var(--amber);
      }
      .tab:hover:not(.active) { color: var(--ink); }

      /* ---- shared sketchy primitives ---- */
      .sk {
        border: 1.5px dashed var(--ink); border-radius: 4px;
        background: rgba(255,255,255,0.45);
        padding: 14px 16px;
      }
      .sk-solid { border-style: solid; }
      .sk-thick { border-width: 2.5px; }
      .sk-paper { background: rgba(255,255,255,0.7); }
      .sk-hi { background: rgba(217,119,87,0.12); border-color: var(--amber); }
      .sk-alert { background: rgba(192,57,43,0.07); border-color: var(--red); }
      .sk-quiet { border-style: dotted; opacity: 0.85; }

      .h-hand {
        font-family: var(--hand); font-weight: 700;
        font-size: 28px; line-height: 1; margin: 0 0 6px;
        letter-spacing: -0.5px;
      }
      .h-hand small {
        font-family: var(--type); font-size: 11px; color: var(--pencil);
        margin-left: 10px; letter-spacing: 1.5px; text-transform: uppercase;
        font-weight: normal;
      }
      .h-section {
        font-family: var(--hand); font-size: 22px; font-weight: 700;
        border-bottom: 1.5px solid var(--ink); padding-bottom: 4px;
        margin: 0 0 12px;
        display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
      }
      .h-section .count {
        font-family: var(--mono); font-size: 11px; color: var(--pencil);
        font-weight: 500;
      }
      .label {
        font-family: var(--type); font-size: 10px; letter-spacing: 1.8px;
        text-transform: uppercase; color: var(--pencil);
      }
      .underline-wavy { text-decoration: underline wavy var(--amber); text-underline-offset: 5px; }

      .pill {
        display: inline-flex; align-items: center; gap: 4px;
        font-family: var(--mono); font-size: 10px; font-weight: 600;
        padding: 1px 7px; border-radius: 2px;
        border: 1px solid var(--ink); color: var(--ink);
        text-transform: uppercase; letter-spacing: 1px;
      }
      .pill.red { color: var(--red); border-color: var(--red); }
      .pill.amber { color: var(--amber); border-color: var(--amber); }
      .pill.green { color: var(--green); border-color: var(--green); }
      .pill.muted { color: var(--pencil); border-color: var(--rule); }
      .pill.solid-amber { background: var(--amber); color: #fff; border-color: var(--amber); }
      .pill.solid-ink { background: var(--ink); color: var(--paper); border-color: var(--ink); }

      .dot { display:inline-block; width:8px; height:8px; border-radius:50%; vertical-align:1px; }
      .dot.r { background: var(--red); }
      .dot.a { background: var(--amber); }
      .dot.g { background: var(--green); }
      .dot.m { background: var(--pencil-soft); }

      .mono { font-family: var(--mono); }
      .type { font-family: var(--type); }
      .hand { font-family: var(--hand); }
      .serif { font-family: var(--serif); }
      .muted { color: var(--pencil); }
      .strike { text-decoration: line-through; text-decoration-color: var(--pencil); }
      .hi { background: linear-gradient(transparent 60%, rgba(217,119,87,0.4) 60%); padding: 0 2px; }
      .ruled {
        background-image: repeating-linear-gradient(
          to bottom, transparent 0, transparent 27px,
          var(--rule) 27px, var(--rule) 28px
        );
        background-position: 0 6px;
      }

      /* margin annotations */
      .marg {
        font-family: var(--hand); font-size: 18px; color: var(--amber);
        position: relative; padding-left: 22px;
      }
      .marg::before {
        content: "↳"; position: absolute; left: 0; top: -2px;
        font-size: 22px; color: var(--amber);
      }
      .marg.left {
        padding-left: 0; padding-right: 22px; text-align: right;
      }
      .marg.left::before { content: "↲"; left: auto; right: 0; }

      /* checkbox */
      .chk {
        display: inline-block; width: 14px; height: 14px;
        border: 1.5px solid var(--ink); border-radius: 2px;
        margin-right: 8px; vertical-align: -2px;
        position: relative;
      }
      .chk.done::after {
        content: "✕"; position: absolute; inset: -3px 0 0 1px;
        color: var(--ink); font-family: var(--hand); font-size: 18px; font-weight: 700;
      }

      /* sketch buttons (quick actions) */
      .btn {
        display: inline-block; font-family: var(--hand); font-size: 18px;
        padding: 2px 12px 4px; border: 1.5px solid var(--ink);
        background: var(--paper); border-radius: 18px;
        cursor: pointer; line-height: 1;
        transform: rotate(-0.4deg);
      }
      .btn:hover { background: var(--ink); color: var(--paper); }
      .btn.amber { border-color: var(--amber); color: var(--amber); }
      .btn.amber:hover { background: var(--amber); color: #fff; }
      .btn.red { border-color: var(--red); color: var(--red); }
      .btn.sm { font-size: 15px; padding: 1px 9px 3px; }
      .btn.solid { background: var(--ink); color: var(--paper); }

      /* placeholder image box */
      .ph {
        background:
          repeating-linear-gradient(135deg,
            transparent 0, transparent 7px,
            rgba(0,0,0,0.07) 7px, rgba(0,0,0,0.07) 8px);
        border: 1px dashed var(--pencil);
        display: flex; align-items: center; justify-content: center;
        font-family: var(--type); font-size: 11px; color: var(--pencil);
        text-align: center; padding: 8px;
      }

      /* Tables */
      table.sk-table {
        width: 100%; border-collapse: collapse;
        font-family: var(--body); font-size: 15px;
      }
      .sk-table th, .sk-table td {
        text-align: left; padding: 8px 10px;
        border-bottom: 1px dashed var(--rule);
      }
      .sk-table th {
        font-family: var(--type); font-size: 10px; text-transform: uppercase;
        letter-spacing: 1.5px; color: var(--pencil); font-weight: normal;
        border-bottom: 1.5px solid var(--ink);
      }
      .sk-table tr:hover td { background: rgba(217,119,87,0.06); }

      /* helpful spacing */
      .row { display: flex; gap: 14px; }
      .col { display: flex; flex-direction: column; gap: 14px; }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
      .stack > * + * { margin-top: 12px; }
      .mt-l { margin-top: 28px; }
      .mt-xl { margin-top: 40px; }

      /* keyboard hint */
      kbd {
        font-family: var(--mono); font-size: 11px;
        border: 1px solid var(--ink); border-bottom-width: 2px;
        border-radius: 3px; padding: 0 5px; background: var(--paper);
      }

      /* footer */
      .footnote {
        font-family: var(--hand); color: var(--pencil); font-size: 17px;
        border-top: 1px dashed var(--rule); padding-top: 10px; margin-top: 28px;
      }

      /* doodle accents (pure CSS — no SVG) */
      .star::before {
        content: "✦"; color: var(--amber); margin-right: 4px;
      }
      .arrow::after { content: " →"; color: var(--pencil); }

      /* used to slightly rotate elements for "pinned" feel */
      .rot-l { transform: rotate(-0.6deg); }
      .rot-r { transform: rotate(0.6deg); }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel" src="wf-shared.jsx"></script>
    <script type="text/babel" src="wf-a-notebook.jsx"></script>
    <script type="text/babel" src="wf-b-inbox.jsx"></script>
    <script type="text/babel" src="wf-c-bridge.jsx"></script>
    <script type="text/babel" src="wf-d-brief.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
